<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clauded · chat demo</title>
<style>
  :root {
    --bg: #1a1814; --panel: #211e19; --panel2: #2a2620; --border: #3a352d;
    --text: #ece6da; --muted: #9b9387; --accent: #d97757; --accent2: #c2410c;
    --user: #30589c; --ok: #4a7c59; --err: #b34b4b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  header .brand { font-weight: 700; letter-spacing: .3px; }
  header .brand span { color: var(--accent); }
  header .grow { flex: 1; }
  .field { display: flex; flex-direction: column; gap: 2px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  input[type=text], input[type=password], select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font-size: 13px; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--accent2); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  button.ghost:hover { background: var(--panel2); color: var(--text); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  #chat { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; }
  .wrap { max-width: 820px; width: 100%; margin: 0 auto; }
  .msg { display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-items: flex-end; }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap;
    word-wrap: break-word; overflow-wrap: anywhere;
  }
  .msg.user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--panel2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .meta { font-size: 11px; color: var(--muted); padding: 0 4px; }
  .meta.error { color: var(--err); }
  .tools { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
  .chip {
    font-size: 11px; background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); border-radius: 999px; padding: 2px 8px;
  }
  .cursor { display: inline-block; width: 7px; height: 15px; background: var(--accent);
    margin-left: 1px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .empty { color: var(--muted); text-align: center; margin-top: 14vh; }
  .empty code { background: var(--panel2); padding: 2px 6px; border-radius: 4px; }
  footer { background: var(--panel); border-top: 1px solid var(--border); padding: 12px 16px; }
  .composer { display: flex; gap: 8px; align-items: flex-end; max-width: 820px; margin: 0 auto; }
  textarea {
    flex: 1; resize: none; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font: inherit; outline: none; max-height: 180px;
  }
  textarea:focus { border-color: var(--accent); }
  .note { font-size: 11px; color: var(--muted); max-width: 820px; margin: 6px auto 0; }
  .sid { font-size: 11px; color: var(--muted); }
  .sid b { color: var(--ok); }
</style>
</head>
<body>
  <header>
    <div class="brand">clauded<span>·</span>demo</div>
    <div class="field" style="min-width:220px;">
      <label>API token (Bearer)</label>
      <input id="token" type="password" placeholder="CLAUDED_API_TOKEN" autocomplete="off">
    </div>
    <div class="field" style="min-width:280px; flex:1;">
      <label>Workdir</label>
      <input id="workdir" type="text" placeholder="/Users/addo/jobs/addodelgrossi/br">
    </div>
    <div class="field">
      <label>Model</label>
      <select id="model">
        <option value="sonnet">sonnet</option>
        <option value="opus">opus</option>
        <option value="haiku">haiku</option>
      </select>
    </div>
    <label class="check"><input id="stream" type="checkbox" checked> streaming</label>
    <label class="check" title="Envia permission_mode=acceptEdits, permitindo o agente escrever arquivos no workdir">
      <input id="edits" type="checkbox"> permitir edições
    </label>
    <div class="grow"></div>
    <span class="sid" id="sid">sessão: <b>nova</b></span>
    <button class="ghost" id="reset">Nova conversa</button>
  </header>

  <div id="chat">
    <div class="wrap empty" id="empty">
      Cole o <code>CLAUDED_API_TOKEN</code>, confira o workdir e mande uma mensagem.<br>
      Demo local — o token fica só no seu navegador.
    </div>
  </div>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Pergunte algo ao clauded…  (Enter envia, Shift+Enter quebra linha)"></textarea>
      <button id="send">Enviar</button>
    </div>
    <div class="note">⚠️ Demo local: o Bearer token trafega a partir do navegador. Não exponha esta página publicamente.</div>
  </footer>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const els = {
    token: $('token'), workdir: $('workdir'), model: $('model'),
    stream: $('stream'), edits: $('edits'), chat: $('chat'), input: $('input'),
    send: $('send'), reset: $('reset'), sid: $('sid'), empty: $('empty'),
  };

  // --- persistência leve em localStorage ---
  const STORE = 'clauded.ui.v1';
  const saved = JSON.parse(localStorage.getItem(STORE) || '{}');
  els.token.value = saved.token || '';
  els.workdir.value = saved.workdir || '';
  els.model.value = saved.model || 'sonnet';
  els.stream.checked = saved.stream !== false;
  els.edits.checked = !!saved.edits;
  const persist = () => localStorage.setItem(STORE, JSON.stringify({
    token: els.token.value, workdir: els.workdir.value, model: els.model.value,
    stream: els.stream.checked, edits: els.edits.checked,
  }));
  ['token','workdir','model','stream','edits'].forEach(k =>
    els[k].addEventListener('change', persist));

  let sessionId = null;
  let busy = false;

  const setSession = id => {
    sessionId = id || null;
    els.sid.innerHTML = 'sessão: <b>' + (sessionId ? sessionId.slice(0, 8) : 'nova') + '</b>';
  };

  els.reset.addEventListener('click', () => {
    if (busy) return;
    setSession(null);
    els.chat.innerHTML = '';
    els.chat.appendChild(els.empty);
  });

  const scroll = () => { els.chat.scrollTop = els.chat.scrollHeight; };

  function addMessage(role) {
    if (els.empty.parentNode) els.empty.remove();
    const wrap = document.createElement('div');
    wrap.className = 'wrap';
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const tools = document.createElement('div'); tools.className = 'tools';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    const meta = document.createElement('div'); meta.className = 'meta';
    msg.append(tools, bubble, meta);
    wrap.appendChild(msg);
    els.chat.appendChild(wrap);
    scroll();
    return { bubble, meta, tools, seenTools: new Set() };
  }

  function addTool(ui, name) {
    if (!name || ui.seenTools.has(name)) return;
    ui.seenTools.add(name);
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = '🔧 ' + name;
    ui.tools.appendChild(chip);
  }

  function metrics(r) {
    if (!r) return '';
    const cost = typeof r.total_cost_usd === 'number' ? ('$' + r.total_cost_usd.toFixed(4)) : null;
    const parts = [];
    if (r.num_turns != null) parts.push(r.num_turns + ' turns');
    if (cost) parts.push(cost);
    if (r.duration_ms != null) parts.push((r.duration_ms / 1000).toFixed(1) + 's');
    return parts.join(' · ');
  }

  function buildBody(prompt) {
    const body = {
      prompt,
      model: els.model.value,
      stream: els.stream.checked,
    };
    if (sessionId) body.resume = sessionId;
    else body.workdir = els.workdir.value.trim();
    if (els.edits.checked) body.permission_mode = 'acceptEdits';
    return body;
  }

  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + els.token.value.trim(),
    };
  }

  function friendlyError(status, text) {
    if (status === 401) return 'Token inválido ou ausente (401).';
    if (status === 403) return 'Workdir fora do allowlist do servidor (403).';
    if (status === 429) return 'Rate limit atingido (429). Aguarde um instante.';
    try { const j = JSON.parse(text); if (j.error?.message) return j.error.message + ' (' + status + ')'; } catch (_) {}
    return 'Erro ' + status + (text ? ': ' + text.slice(0, 300) : '');
  }

  // Extrai texto + nomes de ferramentas de um chunk stream-json do Claude Code.
  function readChunk(obj, ui, state) {
    if (obj.session_id && !sessionId) setSession(obj.session_id);
    if (obj.type === 'assistant' && obj.message?.content) {
      for (const block of obj.message.content) {
        if (block.type === 'text' && block.text) state.text += block.text;
        else if (block.type === 'tool_use') addTool(ui, block.name);
      }
      render(ui, state, true);
    } else if (obj.type === 'result') {
      state.result = obj;
      if (!state.text && typeof obj.result === 'string') state.text = obj.result;
    }
  }

  function render(ui, state, live) {
    ui.bubble.textContent = state.text || (live ? '' : '(sem resposta textual)');
    if (live) {
      const c = document.createElement('span'); c.className = 'cursor';
      ui.bubble.appendChild(c);
    }
    scroll();
  }

  function finalize(ui, state) {
    render(ui, state, false);
    const r = state.result;
    if (r && r.is_error) {
      ui.meta.classList.add('error');
      ui.meta.textContent = 'erro: ' + (r.subtype || 'desconhecido') + (metrics(r) ? ' · ' + metrics(r) : '');
    } else {
      ui.meta.textContent = metrics(r);
    }
  }

  // --- modo streaming: lê o corpo do POST e parseia SSE manualmente ---
  async function runStreaming(body, ui) {
    const res = await fetch('/v1/runs', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
    if (!res.ok) { throw { status: res.status, text: await res.text() }; }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    const state = { text: '', result: null };
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const block = buf.slice(0, idx); buf = buf.slice(idx + 2);
        let event = 'message', data = '';
        for (const line of block.split('\n')) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          else if (line.startsWith('data:')) data += line.slice(5).trim();
        }
        if (!data) continue;
        let obj; try { obj = JSON.parse(data); } catch (_) { continue; }
        if (event === 'message') readChunk(obj, ui, state);
        else if (event === 'error') { state.result = { is_error: true, subtype: obj.error || 'erro' }; if (obj.session_id) setSession(obj.session_id); }
        else if (event === 'done') { if (obj.session_id) setSession(obj.session_id); }
      }
    }
    finalize(ui, state);
  }

  // --- modo simples: request/resposta ---
  async function runSimple(body, ui) {
    ui.bubble.textContent = 'pensando…';
    const res = await fetch('/v1/runs', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
    const txt = await res.text();
    if (!res.ok) { throw { status: res.status, text: txt }; }
    const r = JSON.parse(txt);
    if (r.session_id) setSession(r.session_id);
    const state = { text: typeof r.result === 'string' ? r.result : '', result: r };
    finalize(ui, state);
  }

  async function sendMessage() {
    if (busy) return;
    const prompt = els.input.value.trim();
    if (!prompt) return;
    if (!els.token.value.trim()) { alert('Cole o API token primeiro.'); els.token.focus(); return; }
    if (!sessionId && !els.workdir.value.trim()) { alert('Informe o workdir.'); els.workdir.focus(); return; }

    busy = true; els.send.disabled = true;
    persist();
    addMessage('user').bubble.textContent = prompt;
    els.input.value = ''; els.input.style.height = 'auto';
    const ui = addMessage('assistant');

    try {
      const body = buildBody(prompt);
      if (body.stream) await runStreaming(body, ui);
      else await runSimple(body, ui);
    } catch (e) {
      ui.meta.classList.add('error');
      ui.bubble.textContent = '';
      ui.meta.textContent = (e && e.status) ? friendlyError(e.status, e.text) : ('Falha de rede: ' + (e?.message || e));
    } finally {
      busy = false; els.send.disabled = false; els.input.focus();
    }
  }

  els.send.addEventListener('click', sendMessage);
  els.input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  els.input.addEventListener('input', () => {
    els.input.style.height = 'auto';
    els.input.style.height = Math.min(els.input.scrollHeight, 180) + 'px';
  });
})();
</script>
</body>
</html>
